mode: deployment

config:
  receivers:
    otlp:
      protocols:
        grpc: {}
        http: {}
  processors:
    batch: {}
  exporters:
    debug:
      verbosity: basic
  service:
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]
