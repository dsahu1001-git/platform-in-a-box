apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-platform-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dsahu1001-git/sample-platform-app.git
    targetRevision: main
    path: deploy/sample-platform-app
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
