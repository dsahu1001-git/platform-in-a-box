name: ci-safe

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod

      - name: App unit tests
        working-directory: app
        run: go test ./...

      - name: Portal compile check
        working-directory: portal
        run: go test ./...
