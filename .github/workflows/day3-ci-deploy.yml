name: day3-ci-deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - app/**
      - helm/**
      - .github/workflows/day3-ci-deploy.yml

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  EKS_CLUSTER: ${{ vars.EKS_CLUSTER }}
  RELEASE_NAME: sample-platform-app
  NAMESPACE: platform-demo

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image-metadata.outputs.image_tag }}
      image_repository: ${{ steps.image-metadata.outputs.image_repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required repository variables
        run: |
          test -n "$AWS_REGION" || (echo "Missing repository variable AWS_REGION" && exit 1)
          test -n "$AWS_ROLE_ARN" || (echo "Missing repository variable AWS_ROLE_ARN" && exit 1)
          test -n "$ECR_REPOSITORY" || (echo "Missing repository variable ECR_REPOSITORY" && exit 1)
          test -n "$EKS_CLUSTER" || (echo "Missing repository variable EKS_CLUSTER" && exit 1)

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod

      - name: Test
        working-directory: app
        run: go test ./...

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: day3-direct-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Confirm AWS identity
        run: aws sts get-caller-identity

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build --platform linux/amd64 -t "$IMAGE_URI" ./app
          docker push "$IMAGE_URI"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: capture metadata for deploy stage
        id: image-metadata
        run: |
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_repository=${IMAGE_URI%:*}" >> "$GITHUB_OUTPUT"
  
  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: day3-direct-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}            

      - name: Deploy with Helm
        run: |
          aws eks update-kubeconfig --name "$EKS_CLUSTER" --region "$AWS_REGION"
          helm version
          kubectl version --client=true
          helm upgrade --install "$RELEASE_NAME" ./helm/sample-platform-app \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --set image.repository="${{ needs.build-push.outputs.image_repository }}" \
            --set image.tag="${{ needs.build-push.outputs.image_tag }}"
          kubectl -n "$NAMESPACE" rollout status deploy/"$RELEASE_NAME" --timeout=180s

      - name: Show runtime objects
        run: kubectl -n "$NAMESPACE" get deploy,svc,pods -o wide
