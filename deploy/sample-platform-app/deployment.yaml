apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-platform-app
  labels:
    app.kubernetes.io/name: sample-platform-app
    app.kubernetes.io/instance: sample-platform-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-platform-app
      app.kubernetes.io/instance: sample-platform-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-platform-app
        app.kubernetes.io/instance: sample-platform-app
    spec:
      containers:
        - name: sample-platform-app
          image: sample-platform-app:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: APP_VERSION
              value: "v1"
            - name: APP_ENV
              value: "training"
            - name: SERVICE_NAME
              value: sample-platform-app
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
